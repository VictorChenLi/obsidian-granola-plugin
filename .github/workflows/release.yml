name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npm run package

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          assets=(main.js manifest.json release/granola-meetings-simple-sync.zip)
          # Treat any tag containing a hyphen (e.g. 2.1.0-beta.5) as a
          # pre-release per semver convention.
          prerelease_flag=""
          if [[ "$tag" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; uploading assets with --clobber"
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            echo "Creating release $tag (prerelease=${prerelease_flag:-no})"
            gh release create "$tag" \
              --title="$tag" \
              --generate-notes \
              $prerelease_flag \
              "${assets[@]}"
          fi
